<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <title>PocketLedger — Personal Expense Manager</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PocketLedger">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="brand">
        <span class="brand-logo">💸</span>
        <span class="brand-name">PocketLedger</span>
      </div>
      <nav id="sidenav"></nav>
      <div class="sidebar-footer">
        <button id="sidebar-add" class="btn btn-primary btn-block">＋ Add Transaction</button>
      </div>
    </aside>

    <main id="main">
      <header id="topbar">
        <span class="brand-logo only-mobile">💸</span>
        <h1 id="page-title">Dashboard</h1>
        <div class="topbar-spacer"></div>
        <button id="help-btn" class="btn btn-icon btn-ghost" title="Help" aria-label="Help">❓</button>
      </header>
      <div id="view"></div>
    </main>

    <nav id="bottomnav"></nav>
    <button id="fab" title="Add transaction" aria-label="Add transaction">＋</button>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script src="js/util.js"></script>
  <script src="js/store.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/txform.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/transactions.js"></script>
  <script src="js/views/budgets.js"></script>
  <script src="js/views/recurring.js"></script>
  <script src="js/views/reports.js"></script>
  <script src="js/views/goals.js"></script>
  <script src="js/views/settings.js"></script>
  <script src="js/wizard.js"></script>
  <script src="js/help.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
